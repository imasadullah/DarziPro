<div class="pinpad-container">
  <!-- Invisible keystroke catcher: always focused, never shows/stores the typed digit -->
  <input #hiddenInput class="pin-hidden-input" type="text" inputmode="numeric" autocomplete="off" autocapitalize="off"
    spellcheck="false" aria-hidden="true" tabindex="0" (keydown)="onHiddenKeydown($event)" (blur)="refocus()" />

  <!-- Numeric Indicators row -->
  <div class="pinpad-indicators">
    <span *ngFor="let idx of [].constructor(maxLength); let i = index" class="pin-dot" [class.active]="i < length()">
    </span>
  </div>

  <p class="keyboard-hint"><i class="fa-solid fa-keyboard me-1"></i>You can type the PIN on your keyboard too</p>

  <!-- Keypad grid -->
  <div class="pinpad-grid">
    <button type="button" class="pin-btn" (click)="pressKey('1')">1</button>
    <button type="button" class="pin-btn" (click)="pressKey('2')">2</button>
    <button type="button" class="pin-btn" (click)="pressKey('3')">3</button>

    <button type="button" class="pin-btn" (click)="pressKey('4')">4</button>
    <button type="button" class="pin-btn" (click)="pressKey('5')">5</button>
    <button type="button" class="pin-btn" (click)="pressKey('6')">6</button>

    <button type="button" class="pin-btn" (click)="pressKey('7')">7</button>
    <button type="button" class="pin-btn" (click)="pressKey('8')">8</button>
    <button type="button" class="pin-btn" (click)="pressKey('9')">9</button>

    <button type="button" class="pin-btn clear-btn" (click)="clear()">Clear</button>
    <button type="button" class="pin-btn" (click)="pressKey('0')">0</button>
    <button type="button" class="pin-btn delete-btn" (click)="deleteDigit()">
      <i class="fa-solid fa-delete-left"></i>
    </button>
  </div>
</div>
